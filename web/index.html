<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Werewolf - Agent Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
:root {
  --bg-void: #050709;
  --bg-ink: #0a0e16;
  --bg-surface: #10151f;
  --bg-elevated: #171d2b;
  --bg-card: rgba(17,22,34,0.85);
  --text-primary: #dde1e8;
  --text-secondary: #8892a4;
  --text-muted: #4a5568;
  --border-subtle: rgba(255,255,255,0.05);
  --border-medium: rgba(255,255,255,0.1);
  --accent-claude: #8b5cf6;
  --accent-gemini: #14b8a6;
  --accent-openai: #3b82f6;
  --phase-accent: #475569;
  --feed-width: 340px;
  --header-height: 48px;
  --font-display: 'ZCOOL XiaoWei', 'STKaiti', 'KaiTi', serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
  --font-body: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  --transition-phase: 1.4s;
}
*{box-sizing:border-box;margin:0;padding:0}
body {
  font-family: var(--font-body);
  background: var(--bg-void);
  color: var(--text-primary);
  height: 100vh; overflow: hidden;
  transition: background var(--transition-phase) ease;
}
body.phase-night { --phase-accent: #3b82f6; background: #060a18; }
body.phase-day   { --phase-accent: #d97706; background: #0f0c06; }
body.phase-vote  { --phase-accent: #dc2626; background: #0f0606; }
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  transition: all var(--transition-phase) ease;
  background: radial-gradient(ellipse at 50% 50%, transparent 30%, var(--bg-void) 100%);
}
body.phase-night::after { background: radial-gradient(ellipse at 50% 40%, rgba(30,58,95,0.15) 0%, #060a18 70%); }
body.phase-day::after   { background: radial-gradient(ellipse at 50% 40%, rgba(120,90,30,0.18) 0%, #0f0c06 70%); }
body.phase-vote::after  { background: radial-gradient(ellipse at 50% 40%, rgba(120,30,30,0.14) 0%, #0f0606 70%); }

.grain-overlay {
  position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.028;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.stars-overlay{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0;transition:opacity 2s ease}
body.phase-night .stars-overlay{opacity:1}
.star{position:absolute;border-radius:50%;background:#e2e8f0;animation:twinkle var(--dur,3s) infinite alternate}
@keyframes twinkle{from{opacity:0.15;transform:scale(0.7)}to{opacity:0.9;transform:scale(1.3)}}

.phase-flash{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0}
.phase-flash.do-flash{animation:flash-anim 1.8s ease forwards}
.phase-flash.night{background:radial-gradient(ellipse at center,rgba(30,58,95,0.5),transparent 70%)}
.phase-flash.day{background:radial-gradient(ellipse at center,rgba(120,90,30,0.5),transparent 70%)}
.phase-flash.vote{background:radial-gradient(ellipse at center,rgba(120,30,30,0.4),transparent 70%)}
@keyframes flash-anim{0%{opacity:0}15%{opacity:1}100%{opacity:0}}

.app-header {
  position:relative; z-index:10; height:var(--header-height);
  display:flex; align-items:center; padding:0 20px; gap:16px;
  background:rgba(10,14,22,0.85); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border-subtle);
}
.app-header::after {
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--phase-accent),transparent);
  opacity:0.5; transition:all var(--transition-phase) ease;
}
.header-left{display:flex;align-items:baseline;gap:10px}
.app-title {
  font-family:var(--font-display); font-size:1.5rem; font-weight:400;
  letter-spacing:0.08em; color:#e8e4df;
  text-shadow:0 0 20px rgba(255,255,255,0.08);
}
.app-subtitle{font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase}
.header-center{flex:1;display:flex;align-items:center;justify-content:center;gap:12px}
.phase-indicator {
  font-family:var(--font-mono); font-size:0.72rem; font-weight:600;
  padding:3px 16px; border-radius:4px; letter-spacing:0.06em;
  background:rgba(255,255,255,0.04); border:1px solid var(--border-medium);
  color:var(--text-secondary); transition:all 0.6s ease;
}
.phase-indicator.night{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.3);color:#93c5fd}
.phase-indicator.day{background:rgba(217,119,6,0.1);border-color:rgba(217,119,6,0.3);color:#fcd34d}
.phase-indicator.vote{background:rgba(220,38,38,0.1);border-color:rgba(220,38,38,0.3);color:#fca5a5}
.phase-indicator.sheriff{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:#fde68a}
.round-info{font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted);letter-spacing:0.05em}
.header-right{display:flex;align-items:center;gap:10px}
button{font-family:var(--font-mono);border:none;cursor:pointer;transition:all 0.2s ease;letter-spacing:0.03em}
.scenario-input {
  padding:5px 12px; border-radius:4px; font-size:0.72rem;
  background:var(--bg-secondary); color:var(--text-primary);
  border:1px solid var(--border-medium); width:220px;
  outline:none; transition:border-color 0.2s;
}
.scenario-input:focus{border-color:var(--accent-claude)}
.scenario-input::placeholder{color:var(--text-muted);font-size:0.68rem}
.btn-primary {
  padding:6px 20px; border-radius:4px; font-size:0.72rem; font-weight:700;
  background:var(--accent-claude); color:white;
  box-shadow:0 2px 12px rgba(139,92,246,0.3);
}
.btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,0.45)}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed}
.btn-ghost {
  padding:5px 14px; border-radius:4px; font-size:0.68rem; font-weight:600;
  background:transparent; color:var(--text-muted);
  border:1px solid var(--border-medium);
}
.btn-ghost:hover{background:rgba(255,255,255,0.05);color:var(--text-secondary)}
.conn-status{display:flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:0.6rem;color:var(--text-muted)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#374151;transition:all 0.3s;flex-shrink:0}
.status-dot.connected{background:#10b981;box-shadow:0 0 8px rgba(16,185,129,0.6)}
.status-dot.connecting{background:#f59e0b;animation:pdot 1s infinite}
.status-dot.error{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5)}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:0.3}}

.game-layout {
  position:relative; z-index:5;
  display:grid; grid-template-columns:1fr var(--feed-width);
  height:calc(100vh - var(--header-height)); min-height:0;
}

.game-stage {
  display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden; min-width:0;
}
.table-container {
  position:relative; width:min(780px,90%); height:min(520px,85%); flex-shrink:0;
}

.center-table {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  width:160px; height:110px; border-radius:50%;
  background:radial-gradient(ellipse,rgba(20,30,50,0.8) 0%,rgba(10,14,22,0.9) 100%);
  border:1.5px solid var(--border-subtle);
  box-shadow:0 0 60px rgba(0,0,0,0.8),inset 0 0 30px rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:3px;
  pointer-events:none; z-index:1;
  transition:border-color var(--transition-phase) ease, box-shadow var(--transition-phase) ease;
}
body.phase-night .center-table{border-color:rgba(59,130,246,0.12);box-shadow:0 0 60px rgba(0,0,40,0.9),inset 0 0 20px rgba(30,58,95,0.15)}
body.phase-day .center-table{border-color:rgba(217,119,6,0.1);box-shadow:0 0 60px rgba(40,30,0,0.9),inset 0 0 20px rgba(120,90,30,0.1)}
body.phase-vote .center-table{border-color:rgba(220,38,38,0.1);box-shadow:0 0 60px rgba(40,0,0,0.9),inset 0 0 20px rgba(120,30,30,0.1)}
.table-icon{font-size:1.5rem;opacity:0.4;transition:opacity 0.5s;line-height:1;font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',emoji,sans-serif}
.table-label{font-family:var(--font-display);font-size:0.7rem;color:rgba(255,255,255,0.2);letter-spacing:0.15em}

.player-slot {
  position:absolute; display:flex; flex-direction:column; align-items:center; gap:3px;
  width:76px; z-index:10; transform:translate(-50%,-50%);
  transition:opacity 0.6s ease,filter 0.6s ease;
  animation:slot-in 0.5s cubic-bezier(0.34,1.56,0.64,1) backwards;
}
@keyframes slot-in{from{opacity:0;transform:translate(-50%,-50%) scale(0.7)}}
.player-avatar {
  width:50px; height:50px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.15rem; font-weight:700; color:rgba(255,255,255,0.85);
  position:relative; border:2.5px solid transparent;
  transition:all 0.5s ease; flex-shrink:0;
  font-family:var(--font-body);
}
.player-slot.claude .player-avatar {
  background:radial-gradient(circle,#1e1245,#120a30);
  border-color:var(--accent-claude);
  box-shadow:0 0 16px rgba(139,92,246,0.25),0 4px 16px rgba(0,0,0,0.6);
}
.player-slot.gemini .player-avatar {
  background:radial-gradient(circle,#062e2c,#031a19);
  border-color:var(--accent-gemini);
  box-shadow:0 0 16px rgba(20,184,166,0.25),0 4px 16px rgba(0,0,0,0.6);
}
.player-slot.openai .player-avatar {
  background:radial-gradient(circle,#0c1a3d,#060e24);
  border-color:var(--accent-openai);
  box-shadow:0 0 16px rgba(59,130,246,0.25),0 4px 16px rgba(0,0,0,0.6);
}
.player-slot.dead .player-avatar {
  background:radial-gradient(circle,#1a1e24,#0f1216);
  border-color:#2d3340; box-shadow:none;
  filter:grayscale(1) brightness(0.5);
}
.player-slot.speaking .player-avatar{animation:spk 1.5s ease-in-out infinite}
.player-slot.thinking .player-avatar{animation:thk 2.2s ease-in-out infinite}
@keyframes spk{
  0%,100%{box-shadow:0 0 16px rgba(255,255,255,0.12),0 4px 16px rgba(0,0,0,0.6)}
  50%{box-shadow:0 0 36px rgba(255,255,255,0.45),0 4px 16px rgba(0,0,0,0.6)}
}
@keyframes thk{
  0%,100%{box-shadow:0 0 10px rgba(148,163,184,0.08)}
  50%{box-shadow:0 0 22px rgba(148,163,184,0.25)}
}
.skull-overlay {
  position:absolute; inset:0; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; background:rgba(0,0,0,0.6);
  opacity:0; transition:opacity 0.6s ease;
}
.player-slot.dead .skull-overlay{opacity:1}
.vote-badge {
  position:absolute; top:-6px; right:-6px;
  background:#dc2626; color:white; border-radius:50%;
  width:20px; height:20px;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:0.58rem; font-weight:700;
  opacity:0; transition:opacity 0.3s; z-index:5;
  border:2px solid rgba(0,0,0,0.6);
}
.vote-badge.visible{opacity:1;animation:vpop 0.3s ease}
@keyframes vpop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.sheriff-badge {
  position:absolute; top:-4px; left:-4px;
  width:20px; height:20px; border-radius:50%;
  background:linear-gradient(135deg,#fbbf24,#d97706);
  display:flex; align-items:center; justify-content:center;
  font-size:0.55rem; z-index:6;
  border:2px solid rgba(0,0,0,0.6);
  box-shadow:0 0 8px rgba(251,191,36,0.4);
  opacity:0; transition:opacity 0.3s;
}
.sheriff-badge.visible{opacity:1;animation:vpop 0.3s ease}
.campaign-badge {
  position:absolute; bottom:-3px; right:-3px;
  width:18px; height:18px; border-radius:50%;
  background:linear-gradient(135deg,#38bdf8,#0284c7);
  display:flex; align-items:center; justify-content:center;
  font-size:0.6rem; z-index:6;
  border:2px solid rgba(0,0,0,0.6);
  box-shadow:0 0 6px rgba(56,189,248,0.4);
  opacity:0; transition:opacity 0.3s;
}
.campaign-badge.visible{opacity:1;animation:vpop 0.3s ease}
.player-name {
  font-size:0.7rem; font-weight:700; text-align:center;
  color:rgba(255,255,255,0.88); text-shadow:0 1px 4px rgba(0,0,0,0.9);
  line-height:1.2; white-space:nowrap;
}
.player-role {
  font-family:var(--font-mono); font-size:0.56rem; font-weight:600;
  text-align:center; padding:1px 8px; border-radius:3px;
  background:rgba(0,0,0,0.5); border:1px solid var(--border-subtle);
  color:var(--text-muted); line-height:1.3; white-space:nowrap;
  letter-spacing:0.04em;
}
.player-slot.dead .player-role{color:#3d4555;border-color:rgba(255,255,255,0.03)}
.role-werewolf{color:#f87171 !important;border-color:rgba(248,113,113,0.25) !important}
.role-villager{color:#6ee7b7 !important;border-color:rgba(110,231,183,0.2) !important}
.role-seer{color:#93c5fd !important;border-color:rgba(147,197,253,0.25) !important}
.role-witch{color:#c4b5fd !important;border-color:rgba(196,181,253,0.25) !important}
.role-hunter{color:#fcd34d !important;border-color:rgba(252,211,77,0.25) !important}
.role-idiot{color:#fdba74 !important;border-color:rgba(253,186,116,0.25) !important}
.role-guard{color:#67e8f9 !important;border-color:rgba(103,232,249,0.25) !important}
.role-knight{color:#a5b4fc !important;border-color:rgba(165,180,252,0.25) !important}
.role-wolf_king{color:#f87171 !important;border-color:rgba(248,113,113,0.25) !important}
.role-wolf_beauty{color:#f9a8d4 !important;border-color:rgba(249,168,212,0.25) !important}

.player-tooltip{
  position:fixed;z-index:200;
  background:rgba(10,14,22,0.96);border:1px solid var(--border-medium);
  border-radius:10px;padding:14px 16px;
  max-width:280px;width:max-content;
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  opacity:0;pointer-events:none;transition:opacity 0.15s ease;
  backdrop-filter:blur(12px);
}
.player-tooltip.visible{opacity:1;pointer-events:auto}
.pt-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.pt-name{font-weight:700;font-size:0.88rem;color:var(--text-primary)}
.pt-role{font-size:0.6rem;padding:2px 8px;border-radius:10px;border:1px solid;font-weight:600}
.pt-team{font-size:0.62rem;margin-bottom:10px}
.pt-team.wolf{color:#f87171}
.pt-team.good{color:#6ee7b7}
.pt-skill-title{font-size:0.62rem;color:var(--text-muted);margin-bottom:4px;font-weight:600;letter-spacing:0.05em}
.pt-skill-list{list-style:none;padding:0;margin:0 0 0 0}
.pt-skill-list li{font-size:0.7rem;color:var(--text-primary);padding:2px 0 2px 14px;position:relative;line-height:1.5}
.pt-skill-list li::before{content:'';position:absolute;left:2px;top:9px;width:4px;height:4px;border-radius:50%;background:var(--text-muted)}
.pt-persona{font-size:0.68rem;color:var(--text-secondary);line-height:1.65;margin-top:10px;border-top:1px solid var(--border-subtle);padding-top:8px}
.pt-model{font-size:0.58rem;font-family:var(--font-mono);color:var(--text-muted);margin-top:8px}

.fx-projectile{position:absolute;pointer-events:none;z-index:100}
.fx-ring{position:absolute;border-radius:50%;pointer-events:none;z-index:90;transform:translate(-50%,-50%) scale(0);border:2.5px solid;animation:fx-ring-pop 1.2s ease-out forwards}
@keyframes fx-ring-pop{to{transform:translate(-50%,-50%) scale(1);opacity:0}}
.fx-particle{position:absolute;pointer-events:none;z-index:100;border-radius:50%;animation:fx-scatter 1.1s ease-out forwards}
@keyframes fx-scatter{0%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(0);opacity:0}}
.fx-slash{position:absolute;inset:-8px;z-index:20;pointer-events:none;overflow:visible}
.fx-slash line{stroke-dasharray:55;stroke-dashoffset:55;animation:fx-draw 0.45s ease-out forwards}
.fx-slash line:nth-child(2){animation-delay:0.1s}
.fx-slash line:nth-child(3){animation-delay:0.2s}
@keyframes fx-draw{to{stroke-dashoffset:0}}
.fx-rise{position:absolute;pointer-events:none;z-index:100;border-radius:50%;animation:fx-rise-up 1.5s ease-out forwards}
@keyframes fx-rise-up{0%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),-55px) scale(0.3)}}
.player-slot.fx-glow .player-avatar{animation:fx-glow-pulse 1.4s ease-out !important}
@keyframes fx-glow-pulse{15%{filter:brightness(2.5);box-shadow:0 0 32px 12px var(--fx-color,rgba(255,50,50,0.7))}100%{filter:brightness(1);box-shadow:none}}
.fx-shake{animation:fx-shake 0.6s ease-out !important}
@keyframes fx-shake{8%{transform:translate(-4px,3px)}20%{transform:translate(4px,-3px)}35%{transform:translate(-3px,2px)}50%{transform:translate(3px,-1px)}65%{transform:translate(-1px,1px)}80%{transform:none}}

#vote-svg{position:absolute;inset:0;pointer-events:none;z-index:15;overflow:visible}
.vote-line{stroke:#dc2626;stroke-width:1.5;stroke-dasharray:6,4;fill:none;opacity:0.65;animation:dash-move 1s linear infinite}
@keyframes dash-move{to{stroke-dashoffset:-20}}

.center-speech {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  z-index:25; max-width:480px; width:84%;
  opacity:0; transition:opacity 0.4s ease; pointer-events:none;
}
.center-speech.visible{opacity:1;pointer-events:auto}
.center-speech.fade-out{opacity:0;transition:opacity 0.5s ease}
.center-speech-box {
  background:rgba(255,255,255,0.95); color:#1a1a2e;
  padding:20px 26px; border-radius:16px;
  box-shadow:0 16px 64px rgba(0,0,0,0.7),0 0 0 1px rgba(255,255,255,0.08);
  transition:background 0.3s,color 0.3s;
}
.center-speech-box.gray {
  background:rgba(14,18,28,0.94); color:rgba(200,210,230,0.9);
  border:1px solid rgba(80,100,140,0.2);
  box-shadow:0 16px 64px rgba(0,0,0,0.8),0 0 24px rgba(40,60,100,0.1);
}
.center-speech-header {
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
  padding-bottom:10px; border-bottom:1px solid rgba(0,0,0,0.06);
}
.center-speech-box.gray .center-speech-header{border-bottom-color:rgba(255,255,255,0.06)}
.center-speech-avatar {
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:1rem; font-weight:700; flex-shrink:0;
}
.center-speech-avatar.claude{background:rgba(139,92,246,0.12);border:2px solid var(--accent-claude);color:var(--accent-claude)}
.center-speech-avatar.gemini{background:rgba(20,184,166,0.12);border:2px solid var(--accent-gemini);color:var(--accent-gemini)}
.center-speech-avatar.openai{background:rgba(59,130,246,0.12);border:2px solid var(--accent-openai);color:var(--accent-openai)}
.center-speech-box.gray .center-speech-avatar.claude{color:#c4b5fd}
.center-speech-box.gray .center-speech-avatar.gemini{color:#5eead4}
.center-speech-box.gray .center-speech-avatar.openai{color:#93c5fd}
.center-speech-name{font-weight:800;font-size:0.9rem;color:#1a1a2e}
.center-speech-box.gray .center-speech-name{color:rgba(255,255,255,0.88)}
.center-speech-model{font-family:var(--font-mono);font-size:0.6rem;color:#94a3b8}
.center-speech-box.gray .center-speech-model{color:rgba(148,163,184,0.5)}
.center-speech-text{font-size:0.9rem;line-height:1.75;color:#374151;max-height:200px;overflow-y:auto;word-break:break-word}
.center-speech-box.gray .center-speech-text{color:rgba(180,200,240,0.75)}
.center-speech-cursor {
  display:inline-block; width:2px; height:1em; background:currentColor;
  margin-left:1px; vertical-align:text-bottom;
  animation:blink-cursor 0.6s step-end infinite;
}
@keyframes blink-cursor{0%,100%{opacity:1}50%{opacity:0}}

.feed-panel {
  display:flex; flex-direction:column;
  background:rgba(8,12,20,0.9); backdrop-filter:blur(12px);
  border-left:1px solid var(--border-subtle);
  z-index:20; overflow:hidden;
  transition:width 0.35s cubic-bezier(0.4,0,0.2,1), min-width 0.35s cubic-bezier(0.4,0,0.2,1);
  width:var(--feed-width); min-width:var(--feed-width);
}
.feed-panel.collapsed{width:0;min-width:0;border-left:none}
.feed-panel.collapsed .feed-header,
.feed-panel.collapsed .feed-scroll{opacity:0;pointer-events:none}
.feed-header {
  padding:10px 14px; border-bottom:1px solid var(--border-subtle);
  display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.feed-title{font-family:var(--font-mono);font-size:0.7rem;font-weight:700;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;flex:1}
.feed-count {
  font-family:var(--font-mono); font-size:0.58rem; font-weight:700;
  padding:2px 8px; border-radius:3px;
  background:rgba(139,92,246,0.15); color:#a78bfa;
  min-width:20px; text-align:center;
}
.feed-log-btn {
  font-size:0.6rem; padding:3px 10px; border-radius:3px;
  background:rgba(255,255,255,0.04); color:var(--text-muted);
  border:1px solid var(--border-subtle); font-family:var(--font-mono);
  font-weight:600; letter-spacing:0.03em;
}
.feed-log-btn:hover{background:rgba(255,255,255,0.08);color:var(--text-secondary)}
.feed-toggle-wrap {
  position:absolute; left:-28px; top:50%; transform:translateY(-50%);
  z-index:25;
}
.feed-toggle {
  width:24px; height:48px; border-radius:6px 0 0 6px;
  background:rgba(10,14,22,0.9); border:1px solid var(--border-subtle);
  border-right:none; color:var(--text-muted); font-size:0.65rem;
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); cursor:pointer;
}
.feed-toggle:hover{background:rgba(20,26,40,0.95);color:var(--text-secondary)}
.feed-scroll{flex:1;overflow-y:auto;padding:6px 10px;scroll-behavior:smooth}
.feed-empty {
  display:flex; align-items:center; justify-content:center;
  height:100%; color:var(--text-muted); font-size:0.75rem;
  flex-direction:column; gap:6px;
}
.feed-empty-icon{font-size:1.8rem;opacity:0.25}

.msg-card {
  margin-bottom:5px; padding:8px 10px; border-radius:6px;
  animation:msg-in 0.3s ease; line-height:1.55;
  font-size:0.74rem; word-break:break-word;
  border-left:3px solid transparent;
}
@keyframes msg-in{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.msg-header{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:0.66rem;font-weight:700}
.msg-avatar {
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:0.65rem; font-weight:700; flex-shrink:0;
}
.msg-avatar.claude{background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.4);color:#c4b5fd}
.msg-avatar.gemini{background:rgba(20,184,166,0.2);border:1px solid rgba(20,184,166,0.4);color:#5eead4}
.msg-avatar.openai{background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.4);color:#93c5fd}
.msg-name{color:var(--text-primary)}
.msg-name.claude{color:#c4b5fd}
.msg-name.gemini{color:#5eead4}
.msg-name.openai{color:#93c5fd}
.msg-role {
  font-family:var(--font-mono); font-size:0.5rem; padding:1px 5px;
  border-radius:3px; font-weight:600; letter-spacing:0.02em;
  background:rgba(0,0,0,0.3); border:1px solid var(--border-subtle);
}
.msg-tag {
  font-family:var(--font-mono); font-size:0.5rem; padding:1px 6px;
  border-radius:3px; font-weight:600; letter-spacing:0.04em;
}
.msg-card.speech{background:rgba(99,102,241,0.06);border-left-color:#6366f1}
.msg-card.speech .msg-tag{background:rgba(99,102,241,0.2);color:#a5b4fc}
.msg-card.speech .msg-body{color:rgba(255,255,255,0.82)}
.msg-card.action{background:rgba(234,179,8,0.04);border-left-color:#ca8a04;font-size:0.7rem;padding:6px 10px}
.msg-card.action .msg-tag{background:rgba(234,179,8,0.15);color:#fcd34d}
.msg-card.action .msg-body{color:rgba(255,255,255,0.5)}
.msg-card.vote-msg{background:rgba(249,115,22,0.04);border-left-color:#ea580c;font-size:0.7rem;padding:6px 10px}
.msg-card.vote-msg .msg-tag{background:rgba(249,115,22,0.18);color:#fdba74}
.msg-card.vote-msg .msg-body{color:rgba(255,255,255,0.55)}
.msg-card.death-msg{background:rgba(220,38,38,0.05);border-left-color:#dc2626;font-size:0.72rem}
.msg-card.death-msg .msg-tag{background:rgba(220,38,38,0.18);color:#fca5a5}
.msg-card.narration-msg{background:rgba(139,92,246,0.05);border-left-color:#8b5cf6;text-align:center;padding:10px 12px}
.msg-card.narration-msg .msg-body{color:rgba(196,181,253,0.75);font-style:italic}
.msg-card.system-msg{background:rgba(16,185,129,0.03);border-left-color:#059669;font-size:0.66rem;padding:5px 10px}
.msg-card.system-msg .msg-tag{background:rgba(16,185,129,0.12);color:#6ee7b7}
.msg-card.system-msg .msg-body{color:rgba(255,255,255,0.4)}
.feed-divider {
  display:flex; align-items:center; gap:8px; margin:8px 0 5px;
  font-family:var(--font-mono); font-size:0.58rem; font-weight:600;
  color:var(--text-muted); letter-spacing:0.06em;
}
.feed-divider::before,.feed-divider::after{content:'';flex:1;height:1px;background:var(--border-subtle)}

.narration-overlay {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; opacity:0; transition:opacity 0.6s ease;
  background:rgba(0,0,0,0.4);
}
.narration-overlay.visible{opacity:1;pointer-events:auto}
.narration-box {
  max-width:520px; padding:32px 42px; text-align:center;
  background:rgba(6,8,14,0.92); border:1px solid var(--border-medium);
  border-radius:16px; backdrop-filter:blur(16px);
  box-shadow:0 24px 80px rgba(0,0,0,0.85);
  animation:nar-in 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes nar-in{from{transform:scale(0.9) translateY(10px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.narration-text{font-family:var(--font-display);font-size:1.1rem;line-height:1.8;color:rgba(255,255,255,0.88)}
.narration-hint{font-family:var(--font-mono);font-size:0.58rem;color:var(--text-muted);margin-top:14px;letter-spacing:0.08em}

.end-overlay {
  position:fixed; inset:0; z-index:200;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.88); backdrop-filter:blur(12px);
  opacity:0; pointer-events:none; transition:opacity 0.8s ease;
}
.end-overlay.visible{opacity:1;pointer-events:auto}
.end-panel {
  max-width:600px; width:92%; padding:40px;
  background:linear-gradient(160deg,var(--bg-surface),#12101f);
  border:1px solid var(--border-medium); border-radius:16px;
  box-shadow:0 32px 80px rgba(0,0,0,0.9); text-align:center;
  animation:end-in 0.8s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes end-in{from{transform:scale(0.65) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.winner-banner{font-family:var(--font-display);font-size:2.2rem;margin-bottom:10px;letter-spacing:0.08em}
.winner-villagers{color:#6ee7b7;text-shadow:0 0 30px rgba(110,231,183,0.4)}
.winner-werewolves{color:#f87171;text-shadow:0 0 30px rgba(248,113,113,0.4)}
.winner-reason{font-size:0.82rem;color:var(--text-secondary);margin-bottom:28px;line-height:1.7;max-width:420px;margin-left:auto;margin-right:auto}
.final-players{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px}
.fp-card{padding:10px 6px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid var(--border-subtle);font-size:0.72rem}
.fp-card.dead{opacity:0.45;filter:grayscale(0.5)}
.fp-card .fp-name{font-weight:700;margin-bottom:3px}
.fp-card .fp-model{font-family:var(--font-mono);font-size:0.56rem;opacity:0.5;margin-bottom:3px}
.fp-card .fp-role{font-family:var(--font-mono);font-size:0.62rem}
.fp-card .fp-status{font-family:var(--font-mono);font-size:0.56rem;margin-top:4px;opacity:0.6}
.end-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
#endLogBtn{padding:10px 24px;font-size:0.8rem;border-radius:6px;background:rgba(255,255,255,0.06);color:var(--text-secondary);border:1px solid var(--border-medium)}
#endLogBtn:hover{background:rgba(255,255,255,0.1)}
#endCloseBtn{padding:10px 28px;font-size:0.8rem;border-radius:6px;background:var(--accent-claude);color:white;box-shadow:0 3px 12px rgba(139,92,246,0.35)}
#endCloseBtn:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(139,92,246,0.5)}

.log-overlay {
  position:fixed; inset:0; z-index:180;
  display:flex; flex-direction:column;
  background:rgba(5,7,12,0.97); backdrop-filter:blur(14px);
  opacity:0; pointer-events:none; transition:opacity 0.4s ease;
}
.log-overlay.visible{opacity:1;pointer-events:auto}
.log-overlay-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 24px; border-bottom:1px solid var(--border-subtle); flex-shrink:0;
}
.log-overlay-title{font-family:var(--font-display);font-size:1.1rem;color:var(--text-primary);letter-spacing:0.05em}
.log-overlay-close {
  font-family:var(--font-mono); font-size:0.72rem; font-weight:600;
  padding:6px 18px; border-radius:4px; cursor:pointer;
  background:rgba(255,255,255,0.06); color:var(--text-secondary);
  border:1px solid var(--border-medium); transition:all 0.2s;
}
.log-overlay-close:hover{background:rgba(255,255,255,0.1);color:var(--text-primary)}
.log-overlay-filters {
  display:flex; gap:4px; padding:8px 24px; flex-shrink:0;
  border-bottom:1px solid var(--border-subtle); flex-wrap:wrap;
}
.log-filter-btn {
  font-family:var(--font-mono); font-size:0.62rem; font-weight:600;
  padding:4px 12px; border-radius:3px; cursor:pointer;
  background:rgba(255,255,255,0.04); color:var(--text-muted);
  border:1px solid var(--border-subtle); transition:all 0.2s;
  letter-spacing:0.03em;
}
.log-filter-btn:hover{background:rgba(255,255,255,0.08);color:var(--text-secondary)}
.log-filter-btn.active{background:rgba(139,92,246,0.12);color:#a78bfa;border-color:rgba(139,92,246,0.3)}
.log-export-bar{display:none;align-items:center;gap:8px;padding:8px 24px;border-bottom:1px solid var(--border-subtle);flex-shrink:0}
.log-export-bar.visible{display:flex}
.log-export-btn{font-family:var(--font-mono);font-size:0.62rem;font-weight:600;padding:4px 12px;border-radius:3px;cursor:pointer;border:1px solid var(--border-subtle);transition:all 0.2s;letter-spacing:0.03em}
.log-export-btn.primary{background:rgba(139,92,246,0.15);color:#a78bfa;border-color:rgba(139,92,246,0.3)}
.log-export-btn.primary:hover{background:rgba(139,92,246,0.25)}
.log-export-btn.secondary{background:rgba(255,255,255,0.04);color:var(--text-muted)}
.log-export-btn.secondary:hover{background:rgba(255,255,255,0.08);color:var(--text-secondary)}
.log-export-count{font-family:var(--font-mono);font-size:0.62rem;color:var(--text-muted);margin-left:auto}
.log-overlay-scroll.select-mode .msg-card{cursor:pointer;position:relative;padding-left:34px}
.log-overlay-scroll.select-mode .msg-card::before{content:'';position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;border:1.5px solid var(--border-medium);border-radius:3px;transition:all 0.15s}
.log-overlay-scroll.select-mode .msg-card.log-selected::before{background:rgba(139,92,246,0.8);border-color:#a78bfa}
.log-overlay-scroll.select-mode .msg-card.log-selected::after{content:'';position:absolute;left:13px;top:50%;transform:translateY(-50%) rotate(45deg);width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0}
.log-overlay-scroll.select-mode .msg-card:hover{background:rgba(255,255,255,0.04)}
.log-overlay-scroll{flex:1;overflow-y:auto;padding:14px 24px;min-height:0}
.log-overlay-scroll .msg-card{max-width:700px;margin-left:auto;margin-right:auto;font-size:0.82rem;padding:10px 14px}
.log-overlay-scroll .msg-card .msg-body{line-height:1.7}
.log-overlay-scroll .msg-card .msg-header{font-size:0.72rem}
.log-overlay-scroll .msg-card .msg-avatar{width:26px;height:26px;font-size:0.78rem}
.log-overlay-scroll .feed-divider{max-width:700px;margin:14px auto 10px;font-size:0.7rem}

.empty-state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);font-size:0.8rem;line-height:2;pointer-events:none;user-select:none}
.empty-icon{font-size:2.5rem;opacity:0.15;margin-bottom:4px}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}

@media(max-width:1024px){
  .game-layout{grid-template-columns:1fr;grid-template-rows:1fr auto}
  .feed-panel{width:100% !important;min-width:100% !important;max-height:200px;border-left:none;border-top:1px solid var(--border-subtle)}
  .feed-panel.collapsed{max-height:0}
  .feed-toggle-wrap{display:none}
  .table-container{width:min(600px,95%);height:min(400px,80%)}
}
@media(max-width:640px){
  .app-header{padding:0 10px;gap:8px}
  .app-title{font-size:1.1rem}
  .app-subtitle{display:none}
  .header-center{gap:6px}
  .player-avatar{width:40px;height:40px;font-size:0.95rem}
  .player-slot{width:62px}
  .player-name{font-size:0.6rem}
  .player-role{font-size:0.48rem}
  .final-players{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="grain-overlay"></div>
<div class="stars-overlay" id="starsOverlay"></div>
<div class="phase-flash" id="phaseFlash"></div>

<div class="narration-overlay" id="narrationOverlay">
  <div class="narration-box">
    <div class="narration-text" id="narrationContent"></div>
    <div class="narration-hint">click to dismiss</div>
  </div>
</div>

<div class="player-tooltip" id="playerTooltip"></div>

<div class="log-overlay" id="logOverlay">
  <div class="log-overlay-header">
    <div class="log-overlay-title">游戏日志回顾</div>
    <button class="log-overlay-close" onclick="closeLogOverlay()">关闭 ESC</button>
  </div>
  <div class="log-overlay-filters" id="logFilters">
    <button class="log-filter-btn active" data-filter="all" onclick="setLogFilter('all',this)">全部</button>
    <button class="log-filter-btn" data-filter="speech" onclick="setLogFilter('speech',this)">发言</button>
<button class="log-filter-btn" data-filter="action" onclick="setLogFilter('action',this)">夜间行动</button>
    <button class="log-filter-btn" data-filter="vote-msg" onclick="setLogFilter('vote-msg',this)">投票</button>
    <button class="log-filter-btn" data-filter="death-msg" onclick="setLogFilter('death-msg',this)">死亡</button>
    <button class="log-filter-btn" data-filter="narration-msg" onclick="setLogFilter('narration-msg',this)">旁白</button>
    <button class="log-filter-btn" id="logSelectToggle" onclick="toggleLogSelect()">勾选导出</button>
  </div>
  <div class="log-export-bar" id="logExportBar">
    <button class="log-export-btn secondary" onclick="logSelectAll()">全选可见</button>
    <button class="log-export-btn secondary" onclick="logDeselectAll()">取消全选</button>
    <button class="log-export-btn primary" onclick="exportSelectedLogs()">导出选中</button>
    <span class="log-export-count" id="logExportCount">已选 0 条</span>
  </div>
  <div class="log-overlay-scroll" id="logOverlayScroll"></div>
</div>

<div class="end-overlay" id="endOverlay">
  <div class="end-panel">
    <div class="winner-banner" id="winnerBanner"></div>
    <div class="winner-reason" id="winnerReason"></div>
    <div class="final-players" id="finalPlayers"></div>
    <div class="end-actions">
      <button id="endLogBtn" onclick="closeEnd();openLogOverlay()">查看完整日志</button>
      <button id="endCloseBtn" onclick="closeEnd()">关闭</button>
    </div>
  </div>
</div>

<header class="app-header">
  <div class="header-left">
    <h1 class="app-title">狼人杀</h1>
    <span class="app-subtitle">Agent Arena</span>
  </div>
  <div class="header-center">
    <div class="phase-indicator" id="phaseIndicator">等待开始</div>
    <div class="round-info" id="roundInfo"></div>
  </div>
  <div class="header-right">
    <input id="scenarioInput" type="text" placeholder="场景（选填，如：小说剑来，剑气长城）" class="scenario-input">
    <button id="startBtn" class="btn-primary" onclick="startGame()">开始游戏</button>
    <button id="clearBtn" class="btn-ghost" onclick="clearGame()">重置</button>
    <div class="conn-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">未连接</span>
    </div>
  </div>
</header>

<main class="game-layout">
  <section class="game-stage">
    <div class="table-container" id="tableContainer">
      <svg id="vote-svg" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"></svg>
      <div class="center-table" id="centerTable">
        <div class="table-icon" id="tableIcon">🌕</div>
        <div class="table-label">审判桌</div>
      </div>
      <div class="center-speech" id="centerSpeech">
        <div class="center-speech-box">
          <div class="center-speech-header">
            <div class="center-speech-avatar" id="csBrand"></div>
            <div>
              <div class="center-speech-name" id="csName"></div>
              <div class="center-speech-model" id="csModel"></div>
            </div>
          </div>
          <div class="center-speech-text" id="csText"></div>
        </div>
      </div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🌑</div>
        <div>点击「开始游戏」</div>
      </div>
    </div>
  </section>

  <aside class="feed-panel" id="feedPanel" style="position:relative">
    <div class="feed-toggle-wrap">
      <button class="feed-toggle" id="feedToggle" onclick="toggleFeed()">&#x25C0;</button>
    </div>
    <div class="feed-header" id="feedHeader">
      <span class="feed-title">Live Feed</span>
      <span class="feed-count" id="feedCount">0</span>
      <button class="feed-log-btn" onclick="openLogOverlay()">完整日志</button>
    </div>
    <div class="feed-scroll" id="feedScroll">
      <div class="feed-empty" id="feedEmpty">
        <div class="feed-empty-icon">💬</div>
        <div>等待游戏开始...</div>
      </div>
    </div>
  </aside>
</main>

<script>
var G = {
  players: {},
  phase: null,
  round: 0,
  votes: {},
  highlightTimers: {},
  sheriff: null,
  feedMsgCount: 0,
  feedCollapsed: false,
};
var evtSrc = null;

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function cssEsc(s) { return String(s).replace(/([^\w-])/g,'\\$1'); }
function brand(modelId) {
  if (!modelId) return 'unknown';
  if (modelId.indexOf('claude') !== -1) return 'claude';
  if (modelId.indexOf('gemini') !== -1) return 'gemini';
  if (modelId.indexOf('gpt') !== -1 || /^o[134]/.test(modelId)) return 'openai';
  return 'unknown';
}
function modelLabel(modelId) {
  var m = {
    'claude-sonnet-4-6':'Claude Sonnet 4.6',
    'claude-haiku-4-5-20251001':'Claude Haiku 4.5',
    'claude-opus-4-6':'Claude Opus 4.6',
    'gemini-2.5-flash':'Gemini 2.5 Flash',
    'gemini-2.5-flash-lite':'Gemini 2.5 Flash Lite',
    'gemini-2.5-pro':'Gemini 2.5 Pro',
    'gemini-3-flash-preview':'Gemini 3 Flash',
    'gemini-3.1-pro-preview':'Gemini 3.1 Pro',
    'o3':'OpenAI o3',
    'gpt-4o':'GPT-4o',
    'gpt-4o-mini':'GPT-4o mini'
  };
  return m[modelId] || modelId || '?';
}
function roleLabel(r) {

function startGame() {
  var btn = document.getElementById('startBtn');
  btn.disabled = true;
  setConn('connecting','连接中...');
  if (evtSrc) { evtSrc.close(); evtSrc = null; }
  try {
    var scenario = document.getElementById('scenarioInput').value.trim();
    var gameUrl = '/api/game';
    if (scenario) { gameUrl += '?scenario=' + encodeURIComponent(scenario); }
    evtSrc = new EventSource(gameUrl);
    evtSrc.onopen = function() {
      setConn('connected','已连接');
      addFeedMsg('system-msg', null, '已连接到游戏服务器', '系统');
    };
    evtSrc.onmessage = function(e) {
      try { handleEvent(JSON.parse(e.data)); } catch(err) { console.error('parse error',err); }
    };
    evtSrc.onerror = function() {
      setConn('error','连接断开');
      btn.disabled = false;
      addFeedMsg('system-msg', null, '连接已断开', '系统');
      if (evtSrc) { evtSrc.close(); evtSrc = null; }
    };
  } catch(err) {

    btn.disabled = false;
  }
}

// Event queue
var eventQueue = [];
var queueTimer = null;
function handleEvent(ev) {
  if (ev.type === 'game_start') {
    dispatchEvent(ev);
    return;
  }
  eventQueue.push(ev);
  if (!queueTimer) processQueue();
}
function processQueue() {
  if (eventQueue.length === 0) { queueTimer = null; return; }
  var ev = eventQueue.shift();
  dispatchEvent(ev);
  queueTimer = setTimeout(processQueue, getEventDelay(ev));
}
function getEventDelay(ev) {
  switch (ev.type) {
    case 'thinking_start':
    case 'thought':
      return 0;
    case 'speech':
      var len = (ev.content || '').length;
      var cs = Math.max(35, Math.min(70, 4000 / Math.max(len, 1)));
      return Math.round(len * cs) + 3000;
    case 'phase_change': return 2000;
    case 'narration': return 5000;
    case 'death': case 'elimination': case 'self_explode': case 'hunter_shoot': return 2500;
    case 'vote_cast': return 800;
    case 'vote_tally': return 2000;
    case 'night_action':
      if (ev.action === 'wolf_chat') {
        var wlen = (ev.content || '').length;
        var wcs = Math.max(35, Math.min(60, 3500 / Math.max(wlen, 1)));
        return Math.round(wlen * wcs) + 2000;
      }
      if (ev.action === 'kill_vote') return 1000;
      if (ev.action === 'kill_decided') return 3000;
      return 3000;
    case 'round_start': return 1200;
    case 'sheriff_vote': return 700;
    case 'campaign_run': return 800;
    case 'sheriff_elected': case 'badge_transfer': case 'idiot_reveal': return 2000;
    case 'game_end': return 500;
    case 'postgame_chat':
      var plen = (ev.content || '').length;
      var pcs = Math.max(35, Math.min(60, 3500 / Math.max(plen, 1)));
      return Math.round(plen * pcs) + 2000;
    case 'postgame_end': return 500;
    default: return 500;
  }
}
function clearEventQueue() {
  eventQueue = [];
  if (queueTimer) { clearTimeout(queueTimer); queueTimer = null; }
}

function dispatchEvent(ev) {
  if (ev.player && ev.role && G.players[ev.player]) {
    G.players[ev.player].role = ev.role;
  }
  var fn = {
    genesis_start: evGenesisStart,
    game_start:   evGameStart,
    round_start:  evRoundStart,
    phase_change: evPhaseChange,
    thinking_start: evThinkingStart,
    thought:      evThought,
    speech:       evSpeech,
    night_action: evNightAction,
    vote_cast:    evVoteCast,
    vote_tally:   evVoteTally,
    death:            evDeath,
    elimination:      evElimination,
    hunter_shoot:     evHunterShoot,
    idiot_reveal:     evIdiotReveal,
    sheriff_vote:     evSheriffVote,
    campaign_run:     evCampaignRun,
    sheriff_elected:  evSheriffElected,
    badge_transfer:   evBadgeTransfer,
    self_explode:     evSelfExplode,
    narration:        evNarration,
    game_end:         evGameEnd,
    postgame_chat:    evPostgameChat,
    postgame_end:     evPostgameEnd,
  }[ev.type];
  if (fn) fn(ev);
}

function evNightAction(ev) {
  switch (ev.action) {
    case 'wolf_chat':
      if (ev.player) highlightPlayer(ev.player, 'thinking');
      showCenterSpeech(ev.player, ev.content, {style:'gray', typewriter:true, hold:1500});
      addFeedMsg('action', ev.player, ev.content, '狼人密谋');
      return;
    case 'kill_vote':
      if (ev.player) {
        highlightPlayer(ev.player, 'thinking');
        drawVoteLine(ev.player, ev.target, '#dc2626');
      }
      addFeedMsg('action', ev.player, '投刀 -> '+ev.target, '狼人投票');
      return;
    case 'kill_decided':
      clearVoteSvg();
      var decided = ev.target ? '狼人决定击杀 '+ev.target : '狼人本轮空刀';
      showCenterSpeech(null, decided, {style:'gray', typewriter:false, hold:2500});
      addFeedMsg('action', null, decided, '击杀决定');
      if (ev.target) fxGlow(ev.target, 'rgba(220,38,38,0.6)');
      return;
    default: break;
  }
  var txt;
  switch (ev.action) {
    case 'investigate':
      txt = '查验 '+ev.target+' -> '+ev.result;
      if (ev.player && ev.target) fxScan(ev.player, ev.target);
      break;
    case 'heal':
      txt = '使用解药救了 '+ev.target;
      if (ev.target) fxHealEffect(ev.target);
      break;
    case 'poison':
      txt = '对 '+ev.target+' 使用毒药';
      if (ev.player && ev.target) fxPoison(ev.player, ev.target);
      break;
    case 'guard':
      txt = ev.target ? '守护 '+ev.target : '今晚空守';
      if (ev.target) fxShield(ev.target);
      break;
    case 'charm':
      txt = '魅惑 '+ev.target;
      if (ev.player && ev.target) fxCharm(ev.player, ev.target);
      break;
    default: txt = ev.action+(ev.target ? ' '+ev.target : '');
  }
  if (ev.player) {
    highlightPlayer(ev.player, 'thinking');
    showCenterSpeech(ev.player, txt, {style:'gray', typewriter:false, hold:2000});
  }
  addFeedMsg('action', ev.player, txt, '夜间行动');
}

function fxPos(name) {
  var slot = document.querySelector('.player-slot[data-name="'+cssEsc(name)+'"]');
  if (!slot) return null;
  var cont = document.getElementById('tableContainer');
  var cr = cont.getBoundingClientRect(), sr = slot.getBoundingClientRect();
  return { el: slot, x: sr.left - cr.left + sr.width/2, y: sr.top - cr.top + sr.height/2, cont: cont };
}

function fxFly(fromName, toName, svgStr, dur, cb) {
  var f = fxPos(fromName), t = fxPos(toName);
  if (!f || !t) { if (cb) cb(); return; }
  var el = document.createElement('div');
  el.className = 'fx-projectile';
  el.innerHTML = svgStr;
  el.style.left = f.x + 'px'; el.style.top = f.y + 'px';
  el.style.transform = 'translate(-50%,-50%)';
  el.style.transition = 'left '+(dur||700)+'ms cubic-bezier(.2,.8,.3,1), top '+(dur||700)+'ms cubic-bezier(.2,.8,.3,1)';
  f.cont.appendChild(el);
  requestAnimationFrame(function() { requestAnimationFrame(function() {
    el.style.left = t.x + 'px'; el.style.top = t.y + 'px';
  }); });
  setTimeout(function() { if (el.parentNode) el.remove(); if (cb) cb(); }, (dur||700) + 100);
}

function fxRing(name, color, size) {
  var p = fxPos(name); if (!p) return;
  var el = document.createElement('div');
  el.className = 'fx-ring';
  el.style.left = p.x + 'px'; el.style.top = p.y + 'px';
  el.style.width = (size||70) + 'px'; el.style.height = (size||70) + 'px';
  el.style.borderColor = color;
  p.cont.appendChild(el);
  setTimeout(function() { if (el.parentNode) el.remove(); }, 1300);
}

function fxBurst(name, color, count) {
  var p = fxPos(name); if (!p) return;
  for (var i = 0; i < (count||8); i++) {
    var dot = document.createElement('div');
    dot.className = 'fx-particle';
    dot.style.left = p.x + 'px'; dot.style.top = p.y + 'px';
    dot.style.width = '7px'; dot.style.height = '7px';
    dot.style.background = color;
    var angle = (i / (count||8)) * Math.PI * 2;
    var dist = 35 + Math.random() * 25;
    dot.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    dot.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.cont.appendChild(dot);
    (function(d) { setTimeout(function() { if (d.parentNode) d.remove(); }, 1200); })(dot);
  }
}

function fxSlash(name, color) {
  var slot = fxPos(name); if (!slot) return;
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('class','fx-slash');
  svg.setAttribute('viewBox','0 0 50 50');
  var lines = [[8,8,42,42],[5,25,45,20],[10,42,40,5]];
  lines.forEach(function(l) {
    var line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',l[0]); line.setAttribute('y1',l[1]);
    line.setAttribute('x2',l[2]); line.setAttribute('y2',l[3]);
    line.setAttribute('stroke',color||'#dc2626'); line.setAttribute('stroke-width','3');
    line.setAttribute('stroke-linecap','round');
    svg.appendChild(line);
  });
  var avatar = slot.el.querySelector('.player-avatar');
  if (avatar) avatar.appendChild(svg);
  setTimeout(function() { if (svg.parentNode) svg.remove(); }, 1000);
}

function fxGlow(name, color) {
  var p = fxPos(name); if (!p) return;
  p.el.style.setProperty('--fx-color', color);
  p.el.classList.remove('fx-glow'); void p.el.offsetWidth;
  p.el.classList.add('fx-glow');
  setTimeout(function() { p.el.classList.remove('fx-glow'); }, 1500);
}

function fxShake(name) {
  var p = fxPos(name); if (!p) return;
  p.el.classList.remove('fx-shake'); void p.el.offsetWidth;
  p.el.classList.add('fx-shake');
  setTimeout(function() { p.el.classList.remove('fx-shake'); }, 650);
}

function fxClaw(fromName, toName, cb) {

    setTimeout(function() { fxBurst(toName, '#dc2626', 8); }, 200);

function fxCharm(fromName, toName) {

function fxJudge(name, cb) {
  var p = fxPos(name); if (!p) return (cb && cb());

// Rendering
function renderPlayers() {
  var cont = document.getElementById('tableContainer');
  cont.querySelectorAll('.player-slot').forEach(function(el){ el.remove(); });
  var players = Object.values(G.players).sort(function(a,b){ return a.seatIndex - b.seatIndex; });
  var total = players.length;
  if (total === 0) return;

  var contW = cont.offsetWidth;
  var contH = cont.offsetHeight;
  var cx = contW / 2;
  var cy = contH / 2;
  var rx = contW * 0.42;
  var ry = contH * 0.40;

  players.forEach(function(p, i) {
    var angle = (i / total) * 2 * Math.PI - Math.PI / 2;
    var x = cx + rx * Math.cos(angle);
    var y = cy + ry * Math.sin(angle);

    var b = brand(p.model_id);
    var dead = p.alive === false;
    var rc = roleCls(p.role);
    var slot = document.createElement('div');
    slot.className = 'player-slot ' + b + (dead ? ' dead' : '');
    slot.dataset.name = p.name;
    slot.style.left = x + 'px';
    slot.style.top = y + 'px';
    slot.style.animationDelay = (i * 60) + 'ms';

    slot.innerHTML =
      '<div class="player-avatar">' + esc(pAvatar(p.name)) +
        '<div class="skull-overlay">&#x1F480;</div>' +
        '<div class="vote-badge"></div>' +
        '<div class="sheriff-badge' + (G.sheriff === p.name ? ' visible' : '') + '">&#x1F451;</div>' +
        '<div class="campaign-badge">&#x270B;</div>' +
      '</div>' +
      '<div class="player-name">' + esc(p.name) + '</div>' +
      '<div class="player-role ' + rc + '">' + esc(roleLabel(p.role)) + '</div>';
    slot.addEventListener('mouseenter', function() { showPlayerTooltip(this, p.name); });
    slot.addEventListener('mouseleave', hidePlayerTooltip);
    cont.appendChild(slot);
  });
}

function syncPlayers(players) {
  players.forEach(function(p) { if (G.players[p.name]) Object.assign(G.players[p.name], p); });
  Object.values(G.players).forEach(function(p) {
    var slot = document.querySelector('.player-slot[data-name="'+cssEsc(p.name)+'"]');
    if (!slot) return;
    var b = brand(p.model_id);
    var dead = p.alive === false;
    slot.className = 'player-slot ' + b + (dead ? ' dead' : '');
    var re = slot.querySelector('.player-role');
    if (re && p.role) { re.className = 'player-role ' + roleCls(p.role); re.textContent = roleLabel(p.role); }
  });
}

function refreshSlotRole(name) {
  var p = G.players[name]; if (!p || !p.role) return;
  var slot = document.querySelector('.player-slot[data-name="'+cssEsc(name)+'"]');
  if (!slot) return;
  var re = slot.querySelector('.player-role');

function markDead(name) {
  var p = G.players[name]; if (p) p.alive = false;
  var slot = document.querySelector('.player-slot[data-name="'+cssEsc(name)+'"]');
  if (slot) slot.className = 'player-slot dead';
}

function highlightPlayer(name, cls) {
  var slot = document.querySelector('.player-slot[data-name="'+cssEsc(name)+'"]');
  if (!slot || slot.classList.contains('dead')) return;
  slot.classList.remove('speaking','thinking');
  slot.classList.add(cls);
  if (G.highlightTimers[name]) clearTimeout(G.highlightTimers[name]);
  G.highlightTimers[name] = setTimeout(function() {
    if (slot.parentNode) slot.classList.remove('speaking','thinking');
  }, 8000);
}

// Center speech with typewriter
var centerSpeechTimer = null;
var typewriterTimer = null;
function showCenterSpeech(name, content, opts) {
  var p = name ? G.players[name] : null;
  var style = (opts && opts.style) || 'white';
  var useTypewriter = opts && opts.typewriter === false ? false : true;
  var holdTime = (opts && opts.hold) || 1500;

  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  if (centerSpeechTimer) { clearTimeout(centerSpeechTimer); centerSpeechTimer = null; }

  var el = document.getElementById('centerSpeech');
  var box = el.querySelector('.center-speech-box');
  var b = p ? brand(p.model_id) : '';

  box.classList.remove('gray');
  if (style === 'gray') box.classList.add('gray');

  if (p) {
    document.getElementById('csBrand').className = 'center-speech-avatar ' + b;
    document.getElementById('csBrand').textContent = pAvatar(name);
    document.getElementById('csBrand').style.display = '';
    document.getElementById('csName').textContent = p.display || p.name;
    document.getElementById('csModel').textContent = modelLabel(p.model_id);
  } else {
    document.getElementById('csBrand').style.display = 'none';
    document.getElementById('csName').textContent = '';
    document.getElementById('csModel').textContent = '';
  }

  var textEl = document.getElementById('csText');
  textEl.innerHTML = '';
  el.classList.remove('fade-out');
  el.classList.add('visible');

  if (!useTypewriter) {
    textEl.textContent = content;
    centerSpeechTimer = setTimeout(function() {
      el.classList.add('fade-out');
      setTimeout(function() { el.classList.remove('visible','fade-out'); }, 500);
    }, holdTime);
    return;
  }

  var idx = 0;
  var speed = Math.max(40, Math.min(80, 5000 / Math.max(content.length, 1)));
  var cursor = document.createElement('span');
  cursor.className = 'center-speech-cursor';
  textEl.appendChild(cursor);

  typewriterTimer = setInterval(function() {
    if (idx < content.length) {
      textEl.insertBefore(document.createTextNode(content[idx]), cursor);
      idx++;
    } else {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      if (cursor.parentNode) cursor.remove();
      centerSpeechTimer = setTimeout(function() {
        el.classList.add('fade-out');
        setTimeout(function() { el.classList.remove('visible','fade-out'); }, 500);
      }, holdTime);
    }
  }, speed);
}

function hideCenterSpeech() {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  if (centerSpeechTimer) { clearTimeout(centerSpeechTimer); centerSpeechTimer = null; }
  var el = document.getElementById('centerSpeech');
  el.classList.remove('visible','fade-out');
}

function showBubble(name, type, content, dur) {
  showCenterSpeech(name, content, {style:'white'});
}

function clearAllBubbles() {
  hideCenterSpeech();
}

// Vote visualization
function slotCenter(name) {
  var slot = document.querySelector('.player-slot[data-name="'+cssEsc(name)+'"]');
  if (!slot) return null;
  var cont = document.getElementById('tableContainer');
  var cR = cont.getBoundingClientRect(); var sR = slot.getBoundingClientRect();
  return { x: sR.left-cR.left+sR.width/2, y: sR.top-cR.top+sR.height/2 };
}

function drawVoteLine(from, to, color) {
  var c = color || '#dc2626';
  var svg = document.getElementById('vote-svg');
  var f = slotCenter(from), t = slotCenter(to); if (!f || !t) return;
  var id = 'vl-'+from.replace(/\W/g,'_');
  var ol = document.getElementById(id); if (ol) ol.remove();
  var dx = t.x-f.x, dy = t.y-f.y, dist = Math.sqrt(dx*dx+dy*dy)||1, off = 30;
  var x1 = f.x+dx*off/dist, y1 = f.y+dy*off/dist;
  var x2 = t.x-dx*off/dist, y2 = t.y-dy*off/dist;
  var mid = 'am-'+from.replace(/\W/g,'_');
  var defs = svg.querySelector('defs');
  if (!defs) { defs = document.createElementNS('http://www.w3.org/2000/svg','defs'); svg.insertBefore(defs,svg.firstChild); }
  var om = document.getElementById(mid); if (om) om.remove();
  var marker = document.createElementNS('http://www.w3.org/2000/svg','marker');
  marker.setAttribute('id',mid); marker.setAttribute('markerWidth','8'); marker.setAttribute('markerHeight','8');
  marker.setAttribute('refX','7'); marker.setAttribute('refY','3'); marker.setAttribute('orient','auto');
  var ap = document.createElementNS('http://www.w3.org/2000/svg','path');
  ap.setAttribute('d','M0,0 L0,6 L8,3 z'); ap.setAttribute('fill',c);
  marker.appendChild(ap); defs.appendChild(marker);
  var line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('id',id); line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',x2); line.setAttribute('y2',y2);
  line.setAttribute('class','vote-line'); line.style.stroke = c;
  line.setAttribute('marker-end','url(#'+mid+')'); svg.appendChild(line);
}

function clearGame() {
  if (evtSrc) { evtSrc.close(); evtSrc = null; }
  G = {players:{},phase:null,round:0,votes:{},highlightTimers:{},sheriff:null,feedMsgCount:0,feedCollapsed:false};
  updateFeedCount();
  setConn('','未连接');
  document.getElementById('startBtn').disabled = false;
  clearEventQueue(); clearAllBubbles(); clearVoteSvg();
  var cont = document.getElementById('tableContainer');
  cont.querySelectorAll('.player-slot').forEach(function(el){ el.remove(); });
  document.getElementById('emptyState').style.display = '';
  document.getElementById('feedScroll').innerHTML = '<div class="feed-empty" id="feedEmpty"><div class="feed-empty-icon">💬</div><div>等待游戏开始...</div></div>';
  var ind = document.getElementById('phaseIndicator');
  ind.className = 'phase-indicator'; ind.textContent = '等待开始';
  document.getElementById('roundInfo').textContent = '';
  document.getElementById('narrationOverlay').classList.remove('visible');
  document.getElementById('endOverlay').classList.remove('visible');
  document.getElementById('tableIcon').textContent = '🌕';
  document.body.classList.remove('phase-night','phase-day','phase-vote');
}

// Full-screen log overlay
var currentLogFilter = 'all';
function openLogOverlay() {
  var overlay = document.getElementById('logOverlay');
  var scroll = document.getElementById('logOverlayScroll');
  var feedScroll = document.getElementById('feedScroll');
  scroll.innerHTML = '';
  var children = feedScroll.children;
  for (var i = 0; i < children.length; i++) {
    var child = children[i];
    if (child.id === 'feedEmpty') continue;
    scroll.appendChild(child.cloneNode(true));
  }
  currentLogFilter = 'all';
  document.querySelectorAll('.log-filter-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.filter === 'all');
  });
  applyLogFilter();
  overlay.classList.add('visible');
  requestAnimationFrame(function() { scroll.scrollTop = 0; });
}
function closeLogOverlay() {
  document.getElementById('logOverlay').classList.remove('visible');
  if (logSelectMode) toggleLogSelect();
}
function setLogFilter(filter, btn) {
  currentLogFilter = filter;
  document.querySelectorAll('.log-filter-btn').forEach(function(b) { b.classList.toggle('active', b === btn); });
  applyLogFilter();
}
function applyLogFilter() {
  var scroll = document.getElementById('logOverlayScroll');
  var cards = scroll.querySelectorAll('.msg-card, .feed-divider');
  for (var i = 0; i < cards.length; i++) {
    var card = cards[i];
    if (currentLogFilter === 'all') {
      card.style.display = '';
    } else if (card.classList.contains('feed-divider')) {
      card.style.display = '';
    } else {
      card.style.display = card.classList.contains(currentLogFilter) ? '' : 'none';
    }
  }
}

var logSelectMode = false;
function toggleLogSelect() {
  logSelectMode = !logSelectMode;
  var scroll = document.getElementById('logOverlayScroll');
  var bar = document.getElementById('logExportBar');
  var btn = document.getElementById('logSelectToggle');
  if (logSelectMode) {
    scroll.classList.add('select-mode');
    bar.classList.add('visible');
    btn.classList.add('active');
    scroll.addEventListener('click', onLogCardClick);
  } else {
    scroll.classList.remove('select-mode');
    bar.classList.remove('visible');
    btn.classList.remove('active');
    scroll.removeEventListener('click', onLogCardClick);
    scroll.querySelectorAll('.log-selected').forEach(function(c) { c.classList.remove('log-selected'); });
  }
  updateExportCount();
}

function onLogCardClick(e) {
  var card = e.target.closest('.msg-card');
  if (!card) return;
  card.classList.toggle('log-selected');
  updateExportCount();
}

function updateExportCount() {
  var count = document.querySelectorAll('#logOverlayScroll .msg-card.log-selected').length;
  document.getElementById('logExportCount').textContent = '已选 ' + count + ' 条';
}

function logSelectAll() {
  document.querySelectorAll('#logOverlayScroll .msg-card').forEach(function(c) {
    if (c.style.display !== 'none') c.classList.add('log-selected');
  });
  updateExportCount();
}

function logDeselectAll() {
  document.querySelectorAll('#logOverlayScroll .msg-card.log-selected').forEach(function(c) {
    c.classList.remove('log-selected');
  });
  updateExportCount();
}

function exportSelectedLogs() {
  var cards = document.querySelectorAll('#logOverlayScroll .msg-card.log-selected');
  if (cards.length === 0) return;
  var lines = [];
  cards.forEach(function(card) {
    var body = card.querySelector('.msg-body');
    var name = card.querySelector('.msg-name');
    var tag = card.querySelector('.msg-tag');
    var role = card.querySelector('.msg-role');
    var prefix = '';
    if (tag) prefix += '[' + tag.textContent.trim() + '] ';
    if (name) prefix += name.textContent.trim();
    if (role) prefix += ' (' + role.textContent.trim() + ')';
    if (name || role) prefix += ': ';
    var text = body ? body.textContent.trim() : '';
    lines.push(prefix + text);
  });
  var content = lines.join('\n');
  var blob = new Blob([content], {type:'text/plain;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'werewolf-log-' + new Date().toISOString().slice(0,19).replace(/[T:]/g,'-') + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (document.getElementById('logOverlay').classList.contains('visible')) {
      closeLogOverlay();
    } else if (document.getElementById('endOverlay').classList.contains('visible')) {
      closeEnd();
    }
  }
});

window.startGame = startGame;
window.clearGame = clearGame;
window.closeEnd = closeEnd;
window.openLogOverlay = openLogOverlay;
window.closeLogOverlay = closeLogOverlay;
window.setLogFilter = setLogFilter;
window.toggleFeed = toggleFeed;
window.toggleLogSelect = toggleLogSelect;
window.logSelectAll = logSelectAll;
window.logDeselectAll = logDeselectAll;
window.exportSelectedLogs = exportSelectedLogs;
</script>
